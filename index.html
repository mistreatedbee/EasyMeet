<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Title -->
  <title>EasyMeet | Simple Online Meetings for Everyone</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />

  <!-- SEO -->
  <meta
    name="description"
    content="EasyMeet is a simple and accessible video conferencing platform designed for classrooms, churches, businesses, and communities. Join meetings instantly without complicated setup."
  />

  <meta
    name="keywords"
    content="EasyMeet, video conferencing, online meetings, virtual classroom, Zoom alternative, Teams alternative, Google Meet alternative"
  />

  <meta name="author" content="EasyMeet" />

  <!-- Theme -->
  <meta name="theme-color" content="#2563EB" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="EasyMeet | Simple Online Meetings" />
  <meta
    property="og:description"
    content="A simple video conferencing platform designed for teachers, students, churches, and businesses."
  />
  <meta property="og:image" content="/logo.jpeg" />
  <meta property="og:url" content="https://easymeet.app" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="EasyMeet" />
  <meta
    name="twitter:description"
    content="Simple online meetings made easy."
  />
  <meta name="twitter:image" content="/logo.jpeg" />

  <!-- Apple Devices -->
  <link rel="apple-touch-icon" href="/logo.jpeg" />

  <!-- PWA Ready -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="EasyMeet" />

  <!-- Preconnect for Faster Loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Example Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <noscript>
    EasyMeet requires JavaScript to run. Please enable JavaScript in your browser.
  </noscript>

  <div id="root"></div>

  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
